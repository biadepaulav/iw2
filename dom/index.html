<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM prática 27/04</title>
</head>
<body>
    <!-- Exercício 1
    Crie:
    ● 1 input
    ● 1 botão
    ● 1 parágrafo
    Ao clicar no botão, mostrar no parágrafo o texto digitado. -->
    <div>
        <input type="text">
        <button>Enviar</button>
        <p></p>
        <script>
            function Atualiza() {
                document.getElementsByTagName(input)
            }
        </script>
    </div>
</body>
</html>
